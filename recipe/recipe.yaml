schema_version: 1

context:
  name: sqllineage
  version: "1.5.7"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/sqllineage-${{ version }}.tar.gz
  sha256: 10b7a8abf27eed2ed7f05b485f1a107e7203d06555d72aa5015a115512c8b6c0

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv
  python:
    entry_points:
      - sqllineage = sqllineage.cli:main

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - hatchling >=1.27.0
    # Not listed upstream but needs
    - nodejs
  run:
    - python >=${{ python_min }}
    - sqlparse >=0.5.4
    - sqlfluff >=3.2.0
    - sqlalchemy >=1.4.0
    - networkx >=2.4
    - rustworkx >=0.16.0

tests:
  - python:
      imports:
        - sqllineage
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - sqllineage --help

about:
  summary: SQL Lineage Analysis Tool powered by Python
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/reata/sqllineage

extra:
  recipe-maintainers:
    - thewchan
